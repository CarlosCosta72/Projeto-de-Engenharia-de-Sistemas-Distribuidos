<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização do Vídeo - DesafIAr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        secondary: '#ec4899', // Pink 500
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gray-50 font-sans text-gray-900 antialiased selection:bg-primary selection:text-white flex flex-col min-h-screen">

    <nav class="bg-white shadow-sm border-b border-gray-100 flex-none sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2">
                        <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                        <span class="text-2xl font-bold text-gray-800 tracking-tight">
                            Desaf<span
                                class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">IAr</span>
                        </span>
                    </a>
                </div>
                <div class="flex items-center space-x-4 sm:space-x-8">
                    <a href="/novo"
                        class="text-sm font-medium text-primary hover:text-indigo-700 transition flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                        <span class="hidden sm:inline">Novo Vídeo</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-6 sm:py-8 bg-gray-50/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <nav class="flex mb-6" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li class="inline-flex items-center">
                        <a href="/"
                            class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">
                            <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path
                                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z">
                                </path>
                            </svg>
                            Home
                        </a>
                    </li>
                    <li>
                        <div class="flex items-center">
                            <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                                    clip-rule="evenodd"></path>
                            </svg>
                            <span class="ml-1 text-sm font-medium text-gray-400 md:ml-2">Visualização e Desafios</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
                <div class="lg:col-span-2 flex flex-col space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex-none">

                        <div class="aspect-video bg-gray-900 relative rounded-xl overflow-hidden shadow-sm">
                            <iframe class="w-full h-full absolute inset-0" src="{{ url_embed }}"
                                title="YouTube video player" frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen>
                            </iframe>
                        </div>

                        <div class="p-6">
                            <div class="flex items-center gap-3 mb-3">
                                <span
                                    class="px-2.5 py-1 rounded-md text-xs font-bold bg-green-100 text-green-700 border border-green-200 flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M5 13l4 4L19 7"></path>
                                    </svg>
                                    IA Processada
                                </span>
                            </div>
                            <h1 class="text-2xl font-extrabold text-gray-900 mb-4 tracking-tight">{{ video.titulo }}
                            </h1>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-1 flex flex-col">
                    <div
                        class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6 flex flex-col h-[600px] lg:h-auto lg:min-h-full sticky top-24">
                        <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
                            <div>
                                <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2">
                                    <svg class="w-5 h-5 text-secondary" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                                        </path>
                                    </svg>
                                    Desafios Extraídos
                                </h2>
                                <p class="text-xs text-gray-500 mt-1">Gerados com base no conteúdo do vídeo</p>
                            </div>
                            <button id="btn-novo-desafio"
                                class="bg-primary text-white text-xs font-bold px-4 py-2 rounded-md hover:bg-indigo-700 transition">
                                Novo Desafio
                            </button>
                        </div>

                        <div id="container-desafio" class="space-y-4 flex-grow overflow-y-auto pr-2 custom-scrollbar">
                            <div class="text-center text-gray-500 mt-10">
                                <p>Clique em "Novo Desafio" para puxar uma pergunta do Pool.</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-8 border-t border-gray-800 flex-none mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-white tracking-tight">
                        Desaf<span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">IAr</span>
                    </span>
                </div>
                <p class="text-xs">
                    &copy; 2026 Engenharia de Sistemas Distribuídos.
                </p>
            </div>
        </div>
    </footer>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>

    <script>
        // Pega o ID do vídeo do template do Django
        const videoId = "{{ video.pk }}";
        const btnNovo = document.getElementById('btn-novo-desafio');
        const container = document.getElementById('container-desafio');

        // Array para guardar os IDs do banco estático que já foram mostrados (para não repetir no fallback)
        let desafiosVistos = [];

        // Função que verifica a resposta (chamada quando o usuário clica numa opção)
        function verificarResposta(botaoClicado, opcaoEscolhida, respostaCorreta) {
            // Pega todos os botões de opção dentro do container atual
            const botoesOpcoes = document.querySelectorAll('.opcao-btn');

            // Desabilita todos os botões para impedir cliques duplos
            botoesOpcoes.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:border-primary/50'); // Tira o efeito de hover

                // Mostra qual era a certa pintando de verde
                if (btn.innerText.trim() === respostaCorreta.trim()) {
                    btn.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                    btn.classList.remove('bg-white', 'text-gray-700');
                }
            });

            // Se o usuário errou, pinta o botão que ele clicou de vermelho
            if (opcaoEscolhida.trim() !== respostaCorreta.trim()) {
                botaoClicado.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                botaoClicado.classList.remove('bg-white', 'text-gray-700');
            }
        }

        btnNovo.addEventListener('click', function () {
            // Estado de carregamento
            btnNovo.innerText = "Buscando...";
            btnNovo.disabled = true;

            // Prepara a URL com os IDs que já vimos (útil para o fallback do banco não repetir)
            let urlParams = new URLSearchParams();
            desafiosVistos.forEach(id => urlParams.append('vistos[]', id));

            // Faz a requisição
            fetch(`/api/video/${videoId}/desafio/?${urlParams.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        container.innerHTML = `<p class="text-red-500 text-center mt-10">${data.erro}</p>`;
                    } else {
                        // Se veio do banco estático, guarda o ID
                        if (data.id) desafiosVistos.push(data.id);

                        let opcoesHtml = '';

                        // Monta os botões injetando a função de verificação no onclick
                        // Usamos escape para evitar problemas com aspas dentro do texto da opção
                        data.opcoes.forEach(opcao => {
                            const opcaoEscapada = opcao.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                            const respostaCorretaEscapada = data.resposta_correta.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                            opcoesHtml += `
                                <button onclick="verificarResposta(this, '${opcaoEscapada}', '${respostaCorretaEscapada}')" 
                                        class="opcao-btn w-full text-left p-3 rounded-lg bg-white border border-gray-200 hover:border-primary/50 text-sm text-gray-700 transition-colors shadow-sm mb-2">
                                    ${opcao}
                                </button>
                            `;
                        });

                        // Se a view não enviar a origem (porque você ainda não pôs), define um padrão
                        const origemTexto = data.origem || 'Origem Desconhecida';

                        // Injeta o desafio na tela
                        container.innerHTML = `
                            <div class="border-2 border-primary/20 rounded-xl p-4 bg-indigo-50/30 shadow-sm">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-[10px] uppercase font-bold text-primary bg-white px-2 py-1 rounded shadow-sm inline-block">Múltipla Escolha</span>
                                    <span class="text-[10px] uppercase font-bold text-gray-600 bg-gray-200 px-2 py-1 rounded inline-block">${origemTexto}</span>
                                </div>
                                
                                <h3 class="text-sm font-semibold text-gray-900 mb-4">${data.pergunta}</h3>
                                
                                <div class="space-y-2 mt-2">
                                    ${opcoesHtml}
                                </div>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    container.innerHTML = `<p class="text-red-500 text-center mt-10">Erro na conexão com o servidor.</p>`;
                })
                .finally(() => {
                    // Volta o botão ao normal
                    btnNovo.innerText = "Novo Desafio";
                    btnNovo.disabled = false;
                });
        });
    </script>
</body>

</html>
